<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nurse Dashboard - HSMS</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <nav class="navbar">
    <h2>Nurse Dashboard</h2>
  </nav>

  <section class="form-section">
    <h3>Record Patient Vital Signs</h3>
    <form id="vitalsForm">
      <input type="number" id="patientId" placeholder="Patient ID" required>
      <input type="text" id="bloodPressure" placeholder="Blood Pressure" required>
      <input type="number" step="0.1" id="temperature" placeholder="Temperature (°C)" required>
      <input type="number" step="0.01" id="weight" placeholder="Weight (kg)" required>
      <textarea id="notes" placeholder="Notes"></textarea>
      <button type="submit">Save Vitals</button>
    </form>
  </section>

  <section class="table-section">
    <h3>Vital Signs Records</h3>
    <table id="vitalsTable">
      <thead>
        <tr><th>ID</th><th>Patient</th><th>Date</th><th>BP</th><th>Temp</th><th>Weight</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="assets/js/nurse.js"></script>
</body>
</html>
