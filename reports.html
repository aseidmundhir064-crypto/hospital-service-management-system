<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reports Dashboard - HSMS</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <nav class="navbar">
    <h2>Reports Dashboard</h2>
  </nav>

  <section class="filters">
    <label for="period">Select Report Period:</label>
    <select id="period">
      <option value="daily">Daily</option>
      <option value="weekly">Weekly</option>
      <option value="monthly">Monthly</option>
    </select>
    <button onclick="loadReport()">Generate Report</button>
  </section>

  <section class="report-cards">
    <div class="card"><h3>Patients</h3><p id="patientsCount">0</p></div>
    <div class="card"><h3>Appointments</h3><p id="appointmentsCount">0</p></div>
    <div class="card"><h3>Consultations</h3><p id="consultationsCount">0</p></div>
    <div class="card"><h3>Lab Requests</h3><p id="labRequestsCount">0</p></div>
    <div class="card"><h3>Lab Results</h3><p id="labResultsCount">0</p></div>
    <div class="card"><h3>Prescriptions</h3><p id="prescriptionsCount">0</p></div>
    <div class="card warning"><h3>Low Stock Medicines</h3><p id="lowStockCount">0</p></div>
  </section>

  <button onclick="exportPDF()">Export PDF</button>

  <script src="assets/js/reports.js"></script>
</body>
</html>
